<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentinelAI Shield</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #FAFAFA; color: #0F172A; }

    .header { background: #0F172A; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
    .header h1 { color: #fff; font-size: 15px; font-weight: 700; }
    .header .dot { width: 8px; height: 8px; background: #10B981; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .status { padding: 12px 16px; background: #fff; border-bottom: 1px solid #E5E7EB; font-size: 12px; color: #6B7280; }

    .entries { max-height: 280px; overflow-y: auto; }
    .entry { padding: 10px 16px; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; gap: 10px; }
    .entry:hover { background: #F9FAFB; }
    .score { font-size: 18px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; min-width: 36px; text-align: center; }
    .score.critical { color: #EF4444; }
    .score.likely { color: #F97316; }
    .score.suspicious { color: #F59E0B; }
    .score.clean { color: #10B981; }
    .meta { flex: 1; min-width: 0; }
    .meta .url-text { font-size: 11px; color: #374151; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta .sev { font-size: 10px; color: #9CA3AF; margin-top: 2px; }
    .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
    .badge.critical { background:#FEF2F2; color:#EF4444; }
    .badge.likely { background:#FFF7ED; color:#F97316; }
    .badge.suspicious { background:#FEFCE8; color:#F59E0B; }
    .badge.clean { background:#F0FDF4; color:#10B981; }

    .footer { padding: 10px 16px; display: flex; gap: 8px; }
    .btn { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #6366F1; color: #fff; }
    .btn-secondary { background: #E5E7EB; color: #374151; }

    .empty { padding: 30px 16px; text-align: center; color: #9CA3AF; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <h1>SentinelAI Shield</h1>
  </div>
  <div class="status" id="status">Connecting to SentinelAI...</div>
  <div class="entries" id="entries">
    <div class="empty">No URLs scanned yet.<br>Browse to start protection.</div>
  </div>
  <div class="footer">
    <button class="btn btn-primary" id="btn-open">Open Dashboard</button>
    <button class="btn btn-secondary" id="btn-clear">Clear</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
